<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo com Fetch</title>
</head>
<body>
    <h1>Buscando dados com Fetch</h1>
    <button onclick="buscarUsuario()">Buscar Usuario</button>
    <p id="resultado">Clique no botao para carregar os dados.</p>

    <script>
        function buscarUsuario() {
            fetch('https://jsonplaceholder.typicode.com/users/1')
                .then(resposta => {
                    if (!resposta.ok) {
                        throw new Error("Erro ao buscar os dados");
                    }
                    return resposta.json();
                })
                .then(usuario => {
                    document.getElementById("resultado").innerHTML =
                        "Nome: " + usuario.name + "<br>" +
                        "Email: " + usuario.email + "<br>" +
                        "Cidade: " + usuario.address.city;
                })
                .catch(erro => {
                    document.getElementById("resultado").innerText =
                        "Falha na requisicao: " + erro.message;
                });
        }
    </script>
</body>
</html>
