<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Modelo Com AJAX</title>
    <style>
        .caixa { border: 1px solid blue; padding: 10px; background: #eef; }
    </style>
</head>
<body>
    <h1>Página com AJAX</h1>
    <p>Abaixo, apenas o número será atualizado, sem piscar a tela.</p>
    
    <div class="caixa">
        <strong>Dado da API:</strong> <span id="conteudo">Aguardando...</span>
    </div>

    <br>
    <button id="btnAtualizar">Atualizar apenas o dado</button>

    <script>
        document.getElementById('btnAtualizar').addEventListener('click', function() {
            // Simulando uma busca em uma API externa (JSONPlaceholder)
            // Vamos buscar um post aleatório
            const idAleatorio = Math.floor(Math.random() * 100) + 1;
            
            fetch(`https://jsonplaceholder.typicode.com/posts/${idAleatorio}`)
                .then(response => response.json())
                .then(json => {
                    // Atualiza apenas o texto dentro do <span>
                    document.getElementById('conteudo').innerText = json.title;
                });
        });
    </script>

    <p><em>Nota: O botão não faz a página recarregar. A experiência é instantânea.</em></p>
</body>
</html>
