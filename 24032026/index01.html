<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo de Métodos do DOM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .caixa {
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #333;
    }

    .menu li {
      color: blue;
    }
  </style>
</head>
<body>

  <h1 id="titulo">Título original</h1>

  <p>Parágrafo 1</p>
  <p>Parágrafo 2</p>

  <div class="caixa">Caixa 1</div>
  <div class="caixa">Caixa 2</div>

  <ul class="menu">
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
  </ul>

  <button onclick="usarMetodosDOM()">Executar métodos DOM</button>

  <script>
    function usarMetodosDOM() {
      // 1. getElementById()
      let titulo = document.getElementById("titulo");
      titulo.textContent = "Título alterado com getElementById()";
      titulo.style.color = "red";

      // 2. getElementsByTagName()
      let paragrafos = document.getElementsByTagName("p");
      for (let i = 0; i < paragrafos.length; i++) {
        paragrafos[i].style.fontWeight = "bold";
      }

      // 3. getElementsByClassName()
      let caixas = document.getElementsByClassName("caixa");
      for (let i = 0; i < caixas.length; i++) {
        caixas[i].style.backgroundColor = "lightgray";
      }

      // 4. querySelectorAll()
      let itens = document.querySelectorAll(".menu li");
      itens.forEach(function(item) {
        item.style.color = "green";
      });
    }
  </script>

</body>
</html>
