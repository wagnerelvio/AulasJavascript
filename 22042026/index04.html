<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Evento de Teclado - Enter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }

        p {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Detectando a tecla Enter</h1>

    <input type="text" id="campo" placeholder="Digite algo e pressione Enter">
    
    <p id="mensagem"></p>

    <script>
        const campo = document.getElementById("campo");
        const mensagem = document.getElementById("mensagem");

        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                mensagem.textContent = "Voce pressionou a tecla Enter!";
            }
        });
    </script>

</body>
</html>
