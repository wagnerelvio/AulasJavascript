<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mini-projeto integrando eventos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }

        p {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Mini-projeto integrando eventos</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">
<button id="btn">Enviar</button>
<p id="saida"></p>

    <script>
     const botao = document.getElementById("btn");
const input = document.getElementById("nome");
const saida = document.getElementById("saida");

botao.addEventListener("click", () => {
    if (input.value === "") {
        saida.textContent = "Digite um nome valido";
    } else {
        saida.textContent = "Ola, " + input.value;
    }
});
    </script>

</body>
</html>
