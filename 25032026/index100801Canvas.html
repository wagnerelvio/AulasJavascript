<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formas no Canvas</title>
</head>
<body>
  <canvas id="meuCanvas" width="400" height="250" style="border:1px solid black;"></canvas>

  <script>
    let canvas = document.getElementById("meuCanvas");
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "blue";
    ctx.fillRect(20, 20, 120, 80);

    ctx.beginPath();
    ctx.arc(250, 80, 40, 0, 2 * Math.PI);
    ctx.fillStyle = "green";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(20, 150);
    ctx.lineTo(300, 200);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;
    ctx.stroke();
  </script>
</body>
</html>
