<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exemplo com getElementsByClassName</title>
  <style>
    .caixa {
      padding: 10px;
      margin: 8px 0;
      background-color: lightgray;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h1>Exemplo de DOM</h1>

  <div class="caixa">Primeira caixa</div>
  <div class="caixa">Segunda caixa</div>
  <div class="caixa">Terceira caixa</div>

  <button onclick="alterarCaixas()">Alterar caixas</button>

  <script>
    function alterarCaixas() {
      let elementos = document.getElementsByClassName("caixa");

      for (let i = 0; i < elementos.length; i++) {
        elementos[i].style.backgroundColor = "yellow";
        elementos[i].innerHTML = "Texto alterado pela função JavaScript";
      }
    }
  </script>

</body>
</html>
