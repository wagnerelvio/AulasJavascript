<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo AJAX</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      background-color: #f4f4f4;
      width: 300px;
    }
  </style>
</head>
<body>

  <h1>Exemplo com HTML, JavaScript e AJAX</h1>
  <p>Clique no botão para buscar dados de uma API.</p>

  <button onclick="buscarDados()">Buscar dados</button>

  <div id="resultado">Os dados aparecerão aqui.</div>

  <script>
    function buscarDados() {
      var xhr = new XMLHttpRequest();

      xhr.open("GET", "https://jsonplaceholder.typicode.com/users/2", true);

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var dados = JSON.parse(xhr.responseText);

            document.getElementById("resultado").innerHTML =
              "<strong>Nome:</strong> " + dados.name + "<br>" +
              "<strong>Email:</strong> " + dados.email + "<br>" +
              "<strong>Cidade:</strong> " + dados.address.city;
          } else {
            document.getElementById("resultado").innerHTML =
              "Erro ao buscar os dados.";
          }
        }
      };

      xhr.send();
    }
  </script>

</body>
</html>
